<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1440" />
<title>MIS — Alertas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --font: 'Inter', 'Plus Jakarta Sans', system-ui, -apple-system, Segoe UI, Helvetica, Arial, sans-serif;
    --green: #0f3d2e;
    --green-acc: #34d399;
    --red: #ef4444;
    --orange: #f97316;
    --blue: #3b82f6;
    --purple: #8b5cf6;
    --yellow: #eab308;
  }
  html[data-theme="light"] {
    --bg: #efefef;
    --panel: rgba(255,255,255,0.45);
    --card: rgba(255,255,255,0.55);
    --card-2: #f6f6f6;
    --border: rgba(0,0,0,0.06);
    --border-soft: rgba(0,0,0,0.04);
    --text: #111;
    --text-2: #555;
    --text-3: #777;
    --sidebar: rgba(255,255,255,0.55);
    --search: rgba(255,255,255,0.55);
    --shadow: inset 0 1px 0 rgba(255,255,255,0.7), 0 10px 30px rgba(0,0,0,0.04);
    --shadow-card: inset 0 1px 0 rgba(255,255,255,0.8), 0 20px 40px rgba(0,0,0,0.06);
    --logo-bg: linear-gradient(145deg,#02172a,#0f3555);
    --logo-fg: #ffffff;
    --novo-bg: #1d1d1d;
    --novo-fg: #ffffff;
  }
  html[data-theme="dark"] {
    --bg: #0a1019;
    --panel: rgba(255,255,255,0.03);
    --card: rgba(255,255,255,0.04);
    --card-2: rgba(255,255,255,0.06);
    --border: rgba(255,255,255,0.08);
    --border-soft: rgba(255,255,255,0.06);
    --text: #e9eef5;
    --text-2: #a4adba;
    --text-3: #7b8593;
    --sidebar: rgba(255,255,255,0.025);
    --search: rgba(255,255,255,0.05);
    --shadow: 0 1px 0 rgba(255,255,255,.04) inset, 0 18px 40px rgba(0,0,0,.45);
    --shadow-card: 0 1px 0 rgba(255,255,255,.05) inset, 0 24px 60px rgba(0,0,0,.55);
    --logo-fg: #0e151d;
    --novo-bg: rgba(255,255,255,0.06);
    --novo-fg: #ffffff;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: var(--font); -webkit-font-smoothing: antialiased; }
  body {
    min-height: 100vh;
    background:
      radial-gradient(1200px 600px at 100% 0%, color-mix(in oklab, var(--bg) 88%, white 12%), transparent 60%),
      radial-gradient(900px 500px at 0% 100%, color-mix(in oklab, var(--bg) 92%, white 8%), transparent 60%),
      var(--bg);
  }
  html[data-theme="dark"] body {
    background:
      radial-gradient(900px 600px at 85% -10%, #2a3a52 0%, transparent 55%),
      radial-gradient(800px 600px at 15% 105%, #15243a 0%, transparent 55%),
      radial-gradient(700px 500px at 50% 50%, #14202f 0%, transparent 60%),
      linear-gradient(160deg, #0c1420 0%, #0a1019 100%);
  }

  .app { display: flex; min-height: 100vh; gap: 24px; padding: 20px; }

  /* Sidebar */
  .sidebar {
    width: 250px; flex: none;
    background: var(--sidebar);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-radius: 30px;
    padding: 24px 18px;
    display: flex; flex-direction: column; gap: 18px;
    box-shadow: var(--shadow);
    align-self: flex-start;
    position: sticky; top: 20px;
    max-height: calc(100vh - 40px);
  }
  html[data-theme="dark"] .sidebar {
    backdrop-filter: blur(20px) saturate(140%);
    -webkit-backdrop-filter: blur(20px) saturate(140%);
    background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.015));
    border-right: 1px solid rgba(255,255,255,0.06);
  }
  .logo-row { display: flex; align-items: center; gap: 10px; padding: 0 6px 16px; }
  .logo {
    width: 72px; height: 72px; border-radius: 50%;
    background: var(--logo-bg);
    display: grid; place-items: center;
    color: var(--logo-fg);
    font-weight: 700; font-size: 22px; letter-spacing: .5px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.15), 0 6px 18px rgba(0,0,0,.25);
    position: relative;
    text-decoration: none;
  }
  html[data-theme="dark"] .logo {
    width: 36px; height: 36px; font-size: 0;
    background: transparent; box-shadow: none;
  }
  html[data-theme="dark"] .logo::before {
    content: ""; position: absolute; inset: 0;
    border-radius: 50%;
    background:
      radial-gradient(circle at 50% 50%, transparent 35%, #fff 36%, #fff 41%, transparent 42%),
      radial-gradient(circle at 50% 50%, #fff 18%, transparent 19%);
  }
  html[data-theme="dark"] .logo-text { display: inline-block; }
  html[data-theme="light"] .logo-text { display: none; }
  .logo-text { color: var(--text); font-weight: 700; font-size: 22px; }

  .nav { display: flex; flex-direction: column; gap: 8px; flex: 1; overflow-y: auto; }
  .nav::-webkit-scrollbar { width: 6px; }
  .nav::-webkit-scrollbar-thumb { background: rgba(0,0,0,.08); border-radius: 4px; }
  .nav a {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 18px; border-radius: 16px;
    color: #222; text-decoration: none;
    font-size: 14.5px; font-weight: 500;
  }
  .nav a:hover { background: #f3f3f3; color: var(--text); }
  .nav a.active {
    background: linear-gradient(135deg,#0f3d2e,#062114);
    color: #fff;
    box-shadow: 0 10px 20px rgba(0,0,0,0.12);
  }
  .nav a.active svg { color: #fff; }
  .nav .badge { margin-left: auto; color: var(--red); font-weight: 700; font-size: 14px; }
  .nav a.active .badge { color: #fff; opacity: .85; }
  .nav svg { color: var(--text-2); width: 18px; height: 18px; flex: none; }

  .user-card {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 14px;
    background: rgba(255,255,255,0.6); border: 0;
    border-radius: 20px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.05);
  }
  html[data-theme="dark"] .user-card {
    backdrop-filter: blur(14px) saturate(140%);
    background: rgba(255,255,255,0.04);
    border-color: rgba(255,255,255,0.08);
  }
  .avatar {
    width: 46px; height: 46px; border-radius: 50%;
    background: linear-gradient(135deg,#7a7a7a,#3a3a3a);
    background-size: cover; background-position: center;
    flex: none;
  }
  .user-card .name { font-size: 15px; font-weight: 600; color: var(--text); line-height: 1.15; }
  .user-card .role { font-size: 12px; color: var(--text-3); }
  .user-card .chev { margin-left: auto; color: var(--text-3); }

  /* Main */
  .main { flex: 1; display: flex; flex-direction: column; gap: 24px; min-width: 0; }

  .topbar { display: flex; align-items: center; gap: 16px; }
  .search {
    flex: 1; max-width: 520px;
    display: flex; align-items: center; gap: 10px;
    background: var(--search);
    border: 0;
    height: 58px; border-radius: 20px; padding: 0 22px;
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.03);
  }
  html[data-theme="dark"] .search,
  html[data-theme="dark"] .icon-btn,
  html[data-theme="dark"] .user-trigger,
  html[data-theme="dark"] .btn-primary,
  html[data-theme="dark"] .select,
  html[data-theme="dark"] .tabs,
  html[data-theme="dark"] .stat,
  html[data-theme="dark"] .alert,
  html[data-theme="dark"] .panel,
  html[data-theme="dark"] .theme-switch {
    backdrop-filter: blur(14px) saturate(140%);
    -webkit-backdrop-filter: blur(14px) saturate(140%);
    background: rgba(255,255,255,0.04);
    border-color: rgba(255,255,255,0.08);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
  }
  .search input { flex: 1; background: transparent; border: 0; outline: 0; color: var(--text); font: 500 14.5px var(--font); }
  .search input::placeholder { color: var(--text-3); }
  .kbd {
    font-size: 12.5px; color: var(--text-3); display: inline-flex; gap: 4px;
    padding: 4px 8px; border-radius: 6px;
    background: color-mix(in oklab, var(--search) 70%, var(--bg));
    border: 1px solid var(--border);
  }
  .top-actions { margin-left: auto; display: flex; align-items: center; gap: 18px; }
  .btn-primary {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--novo-bg); color: var(--novo-fg);
    border: 0;
    height: 52px; padding: 0 28px; border-radius: 50px;
    font: 600 14px var(--font); cursor: pointer;
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
  }
  .icon-btn {
    width: 48px; height: 48px; border-radius: 50%;
    background: rgba(255,255,255,0.7); border: 0;
    display: grid; place-items: center; position: relative; cursor: pointer;
    color: var(--text);
  }
  .icon-btn .dot {
    position: absolute; top: -2px; right: -2px;
    background: var(--red); color: #fff;
    min-width: 18px; height: 18px; border-radius: 9px;
    font-size: 11px; font-weight: 700;
    display: grid; place-items: center; padding: 0 4px;
    border: 2px solid var(--bg);
  }
  html[data-theme="dark"] .icon-btn .dot { border-color: #0b121c; }
  .user-trigger {
    display: flex; align-items: center; gap: 6px;
    background: transparent; border: 0;
    height: 48px; padding: 0; cursor: pointer;
  }
  .user-trigger .avatar { width: 48px; height: 48px; }

  /* Page header */
  .page-head { display: flex; align-items: flex-end; gap: 20px; padding: 0; }
  .page-head h1 {
    margin: 0; font-size: 28px; font-weight: 700;
    letter-spacing: -0.4px; color: var(--text);
    display: inline-flex; align-items: center; gap: 12px;
  }
  .page-head h1 .pulse {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--red); position: relative;
    box-shadow: 0 0 0 0 rgba(239,68,68,.7);
    animation: pulse 1.6s ease-out infinite;
  }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(239,68,68,.6); }
    70%  { box-shadow: 0 0 0 14px rgba(239,68,68,0); }
    100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); }
  }
  .page-head .sub { color: var(--text-3); font-size: 14px; margin-top: 6px; }
  .page-head .right { margin-left: auto; display: flex; gap: 10px; }

  /* Stats */
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; }
  .stat {
    background: rgba(255,255,255,0.55); border: 0;
    border-radius: 24px; padding: 22px 24px;
    display: flex; flex-direction: column; gap: 8px;
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.7), 0 10px 30px rgba(0,0,0,0.04);
  }
  .stat .label { font-size: 13px; color: var(--text-2); display: flex; align-items: center; gap: 8px; }
  .stat .label .ico {
    width: 28px; height: 28px; border-radius: 8px;
    display: grid; place-items: center;
    background: var(--card-2);
  }
  .stat .num { font-size: 32px; font-weight: 800; color: var(--text); letter-spacing: -0.5px; }
  .stat .delta { font-size: 12px; color: var(--text-3); }
  .stat .delta.up { color: #b91c1c; }
  .stat .delta.down { color: #15803d; }
  .stat.tone-red .ico    { background: rgba(239,68,68,.18);  color: #ef4444; }
  .stat.tone-orange .ico { background: rgba(249,115,22,.18); color: #c2410c; }
  .stat.tone-amber .ico  { background: rgba(234,179,8,.22);  color: #b45309; }
  .stat.tone-blue .ico   { background: rgba(59,130,246,.18); color: #3b82f6; }
  html[data-theme="dark"] .stat.tone-orange .ico { color: #fb923c; }
  html[data-theme="dark"] .stat.tone-amber  .ico { color: #fbbf24; }

  /* Tabs */
  .tabs-row { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .tabs {
    display: inline-flex; gap: 14px; padding: 0;
    background: transparent; border: 0;
    border-radius: 0;
  }
  .tabs button {
    border: 0; background: #f6f6f6; cursor: pointer;
    padding: 14px 24px; border-radius: 30px;
    font: 600 14px var(--font); color: var(--text-2);
    display: inline-flex; align-items: center; gap: 8px;
  }
  .tabs button .count {
    font-size: 11px; padding: 2px 7px; border-radius: 10px;
    background: rgba(0,0,0,0.06); color: var(--text-2);
  }
  .tabs button.active {
    background: linear-gradient(135deg,#113a2b,#062114);
    color: #fff;
    box-shadow: 0 10px 20px rgba(0,0,0,0.1);
  }
  .tabs button.active .count { background: rgba(255,255,255,.15); color: #fff; }
  .right-tools { margin-left: auto; display: flex; align-items: center; gap: 16px; }
  .select {
    background: rgba(255,255,255,0.7); border: 0;
    height: 46px; padding: 0 20px; border-radius: 20px;
    display: inline-flex; align-items: center; gap: 8px;
    font: 500 14px var(--font); color: var(--text); cursor: pointer;
  }

  /* Group */
  .group-head {
    display: flex; align-items: center; gap: 10px;
    margin-top: 6px; padding: 0 4px;
  }
  .group-head .title { font-size: 13px; font-weight: 700; color: var(--text-2); text-transform: uppercase; letter-spacing: .6px; }
  .group-head .line { flex: 1; height: 1px; background: var(--border); }

  /* Alerts */
  .alerts { display: flex; flex-direction: column; gap: 14px; }
  .alert {
    position: relative;
    background: rgba(255,255,255,0.55); border: 0;
    border-radius: 24px; padding: 18px 22px 18px 28px;
    display: grid; grid-template-columns: 40px 1fr auto; gap: 16px;
    align-items: flex-start;
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.7), 0 10px 30px rgba(0,0,0,0.04);
    transition: transform .15s, box-shadow .15s;
  }
  .alert:hover { transform: translateY(-1px); box-shadow: var(--shadow-card); }
  .alert::before {
    content: ""; position: absolute; left: 0; top: 16px; bottom: 16px;
    width: 4px; border-radius: 0 4px 4px 0;
  }
  .alert.sev-critical::before { background: #ef4444; }
  .alert.sev-warning::before  { background: #f59e0b; }
  .alert.sev-info::before     { background: #3b82f6; }
  .alert.sev-success::before  { background: #22c55e; }
  .alert.unread { background: color-mix(in oklab, var(--card) 90%, var(--red) 6%); }
  html[data-theme="dark"] .alert.unread { background: rgba(255,255,255,0.06); }

  .alert .sev {
    width: 40px; height: 40px; border-radius: 12px;
    display: grid; place-items: center;
    background: var(--card-2);
  }
  .alert.sev-critical .sev { background: rgba(239,68,68,.18); color: #ef4444; }
  .alert.sev-warning  .sev { background: rgba(245,158,11,.22); color: #b45309; }
  .alert.sev-info     .sev { background: rgba(59,130,246,.18); color: #3b82f6; }
  .alert.sev-success  .sev { background: rgba(34,197,94,.18); color: #15803d; }
  html[data-theme="dark"] .alert.sev-warning .sev { color: #fbbf24; }
  html[data-theme="dark"] .alert.sev-success .sev { color: #34d399; }

  .a-body { min-width: 0; }
  .a-head { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .a-title { font-size: 15px; font-weight: 700; color: var(--text); line-height: 1.25; }
  .a-tag {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 3px 9px; border-radius: 999px;
    font: 700 11px var(--font); letter-spacing: .4px; text-transform: uppercase;
  }
  .a-tag.sev-critical { background: rgba(239,68,68,.18); color: #b91c1c; }
  .a-tag.sev-warning  { background: rgba(245,158,11,.22); color: #a16207; }
  .a-tag.sev-info     { background: rgba(59,130,246,.18); color: #1d4ed8; }
  .a-tag.sev-success  { background: rgba(34,197,94,.18); color: #15803d; }
  html[data-theme="dark"] .a-tag.sev-critical { color: #fca5a5; }
  html[data-theme="dark"] .a-tag.sev-warning  { color: #fde68a; }
  html[data-theme="dark"] .a-tag.sev-info     { color: #93c5fd; }
  html[data-theme="dark"] .a-tag.sev-success  { color: #86efac; }
  .unread-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--red); }

  .a-desc { font-size: 13.5px; color: var(--text-2); margin-top: 6px; line-height: 1.45; }
  .a-meta {
    display: flex; align-items: center; gap: 14px; margin-top: 10px;
    color: var(--text-3); font-size: 12.5px; flex-wrap: wrap;
  }
  .a-meta .item { display: inline-flex; align-items: center; gap: 6px; }
  .a-meta .swatch { width: 8px; height: 8px; border-radius: 3px; }
  .a-meta .who { display: inline-flex; align-items: center; gap: 6px; }
  .a-meta .who .av { width: 18px; height: 18px; border-radius: 50%; background-size: cover; background-position: center; }

  .a-actions { display: flex; align-items: center; gap: 8px; }
  .a-actions button {
    border: 1px solid var(--border-soft);
    background: var(--card-2);
    color: var(--text); font: 600 12.5px var(--font);
    padding: 8px 14px; border-radius: 999px; cursor: pointer;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .a-actions button:hover { background: var(--card); }
  .a-actions button.primary { background: var(--green); color: #fff; border-color: transparent; }
  .a-actions button.ghost   { background: transparent; }
  .a-actions .iconbtn {
    width: 34px; height: 34px; padding: 0; border-radius: 50%;
    display: grid; place-items: center;
  }
  html[data-theme="dark"] .a-actions button {
    background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.1);
  }
  html[data-theme="dark"] .a-actions button.primary { background: #16a34a; }
  html[data-theme="dark"] .a-actions button.ghost { background: transparent; }

  .alert.resolved { opacity: 0.65; }
  .alert.resolved .a-title { text-decoration: line-through; color: var(--text-3); }

  /* Side panel */
  .layout { display: grid; grid-template-columns: 1fr 320px; gap: 22px; align-items: flex-start; }
  .panel {
    background: rgba(255,255,255,0.55); border: 0;
    border-radius: 24px; padding: 22px;
    display: flex; flex-direction: column; gap: 14px;
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.7), 0 10px 30px rgba(0,0,0,0.04);
    position: sticky; top: 22px;
  }
  .panel h3 { margin: 0; font-size: 14px; font-weight: 700; color: var(--text); }
  .legend { display: flex; flex-direction: column; gap: 10px; }
  .legend .row { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--text-2); }
  .legend .row .swatch { width: 10px; height: 10px; border-radius: 3px; }
  .legend .row .count { margin-left: auto; font-weight: 700; color: var(--text); }

  .spark { display: flex; align-items: flex-end; gap: 6px; height: 60px; }
  .spark .b {
    flex: 1; background: linear-gradient(180deg, #ef4444, #f97316);
    border-radius: 4px 4px 2px 2px; opacity: .85;
  }
  html[data-theme="dark"] .spark .b { opacity: 1; }

  .quiet {
    border: 1px dashed var(--border);
    border-radius: 12px; padding: 12px;
    font-size: 12.5px; color: var(--text-3); line-height: 1.5;
  }

  /* Theme switch */
  .theme-switch {
    position: fixed; right: 22px; bottom: 22px; z-index: 50;
    background: rgba(255,255,255,0.7); border: 0;
    border-radius: 24px; padding: 6px;
    display: inline-flex; gap: 4px;
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  }
  .theme-switch button {
    border: 0; background: transparent; cursor: pointer;
    width: 38px; height: 38px; border-radius: 50%;
    display: grid; place-items: center; color: var(--text-2);
  }
  .theme-switch button.active {
    background: linear-gradient(135deg,#113a2b,#062114);
    color: #fff;
  }

  @media (max-width: 1200px) {
    .app { flex-direction: column; }
    .sidebar { width: 100%; position: static; max-height: none; }
    .search { max-width: 100%; }
    .topbar { flex-direction: column; gap: 16px; align-items: stretch; }
    .layout { grid-template-columns: 1fr; }
    .panel { position: static; }
  }
  @media (max-width: 900px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body data-screen-label="03 Alertas">
<div id="root"></div>

function AlertItem({ a, onResolve, onDismiss, resolved }) {
  const proj = PROJECTS[a.project];
  const sev = resolved ? "success" : a.severity;
  return (
    <div className={"alert sev-" + sev + (a.unread && !resolved ? " unread" : "") + (resolved ? " resolved" : "")}>
      <div className="sev">{resolved ? I.tick : a.icon}</div>
      <div className="a-body">
        <div className="a-head">
          {a.unread && !resolved && <span className="unread-dot" title="Não lido"></span>}
          <span className="a-title">{a.title}</span>
          <span className={"a-tag sev-" + sev}>{SEV_LABEL[sev]}</span>
        </div>
        <div className="a-desc">{a.desc}</div>
        <div className="a-meta">
          <span className="item"><span className="swatch" style={{ background: proj.color }}></span>{proj.name}</span>
          <span className="item" style={{ fontSize: "6px", width: "59px" }}>{I.clock}{a.when}</span>
          <span className="item who">

            {a.who}
          </span>
        </div>
      </div>
      <div className="a-actions">
        {!resolved && <button className="primary" onClick={onResolve}>{I.tick}<span>Resolver</span></button>}
        {!resolved && <button onClick={onDismiss}>Ignorar</button>}
        {!resolved && <button className="ghost iconbtn" title="Abrir">{I.external}</button>}

      <button className={theme === "dark" ? "active" : ""} onClick={() => setTheme("dark")} aria-label="Modo escuro">{I.moon}</button>
    </div>);

function App() {
  const [theme, setTheme] = useState(() => localStorage.getItem("mis-theme") || "light");
  const [tab, setTab] = useState("todos");
  const [resolvedIds, setResolvedIds] = useState(() => new Set());
  const [dismissedIds, setDismissedIds] = useState(() => new Set());

  useEffect(() => {
    document.documentElement.setAttribute("data-theme", theme);
    localStorage.setItem("mis-theme", theme);
  }, [theme]);

  const visible = useMemo(() => {
    let list = ALERTS.filter((a) => !dismissedIds.has(a.id));
    if (tab === "nao") list = list.filter((a) => a.unread && !resolvedIds.has(a.id) && !a.resolved);
    if (tab === "crit") list = list.filter((a) => a.severity === "critical");
    if (tab === "aviso") list = list.filter((a) => a.severity === "warning");
    if (tab === "info") list = list.filter((a) => a.severity === "info");
    return list;
  }, [tab, dismissedIds, resolvedIds]);

  const grouped = useMemo(() => {
    const order = ["Hoje", "Ontem", "Esta semana"];
    const map = {};
    visible.forEach((a) => {(map[a.group] = map[a.group] || []).push(a);});
    return order.filter((g) => map[g]).map((g) => [g, map[g]]);
  }, [visible]);

  const resolve = (id) => setResolvedIds((prev) => new Set(prev).add(id));
  const dismiss = (id) => setDismissedIds((prev) => new Set(prev).add(id));

  return (
    <div className="app">
      <Sidebar />
      <main className="main">
        <Topbar />
        <div className="page-head">
          <div>
            <h1><span className="pulse"></span>Alertas</h1>
            <div className="sub">5 alertas não lidos · 2 críticos exigem ação imediata</div>
          </div>
          <div className="right">
            <button className="select">{I.cal}<span>Últimos 7 dias</span>{I.chev}</button>
            <button className="select">{I.tick}<span>Marcar tudo como lido</span></button>
          </div>
        </div>
        <Stats />
        <TabsRow tab={tab} setTab={setTab} />
        <div className="layout">
          <div className="alerts">
            {grouped.length === 0 &&
            <div className="quiet" style={{ padding: 20, textAlign: "center" }}>Nenhum alerta neste filtro. ✨</div>
            }
            {grouped.map(([group, items]) =>
            <React.Fragment key={group}>
                <div className="group-head">
                  <span className="title">{group}</span>
                  <span className="line"></span>
                  <span style={{ fontSize: 12, color: "var(--text-3)" }}>{items.length}</span>
                </div>
                {items.map((a) =>
              <AlertItem
                key={a.id} a={a}
                resolved={resolvedIds.has(a.id) || a.resolved}
                onResolve={() => resolve(a.id)}
                onDismiss={() => dismiss(a.id)} />

              )}
              </React.Fragment>
            )}
          </div>
          <SidePanel />
        </div>
      </main>
      <ThemeSwitch theme={theme} setTheme={setTheme} />
    </div>);

}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
