<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1440" />
<title>MIS — Atualizações</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --font: 'Inter', 'Plus Jakarta Sans', system-ui, -apple-system, Segoe UI, Helvetica, Arial, sans-serif;
    --green: #0f3d2e;
    --green-acc: #34d399;
    --red: #ef4444;
  }
  html[data-theme="light"] {
    --bg: #efefef;
    --panel: rgba(255,255,255,0.45);
    --card: rgba(255,255,255,0.55);
    --card-2: #f6f6f6;
    --border: rgba(0,0,0,0.06);
    --border-soft: rgba(0,0,0,0.04);
    --text: #111;
    --text-2: #555;
    --text-3: #777;
    --sidebar: rgba(255,255,255,0.55);
    --search: rgba(255,255,255,0.55);
    --shadow: inset 0 1px 0 rgba(255,255,255,0.7), 0 10px 30px rgba(0,0,0,0.04);
    --shadow-card: inset 0 1px 0 rgba(255,255,255,0.8), 0 20px 40px rgba(0,0,0,0.06);
    --logo-bg: linear-gradient(145deg,#02172a,#0f3555);
    --logo-fg: #ffffff;
    --novo-bg: #1d1d1d;
    --novo-fg: #ffffff;
  }
  html[data-theme="dark"] {
    --bg: #0a1019;
    --panel: rgba(255,255,255,0.03);
    --card: rgba(255,255,255,0.04);
    --card-2: rgba(255,255,255,0.06);
    --border: rgba(255,255,255,0.08);
    --border-soft: rgba(255,255,255,0.06);
    --text: #e9eef5;
    --text-2: #a4adba;
    --text-3: #7b8593;
    --sidebar: rgba(255,255,255,0.025);
    --search: rgba(255,255,255,0.05);
    --shadow: 0 1px 0 rgba(255,255,255,.04) inset, 0 18px 40px rgba(0,0,0,.45);
    --shadow-card: 0 1px 0 rgba(255,255,255,.05) inset, 0 24px 60px rgba(0,0,0,.55);
    --logo-fg: #0e151d;
    --novo-bg: rgba(255,255,255,0.06);
    --novo-fg: #ffffff;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: var(--font); -webkit-font-smoothing: antialiased; height: 100%; }
  body {
    min-height: 100vh;
    background:
      radial-gradient(1200px 600px at 100% 0%, color-mix(in oklab, var(--bg) 88%, white 12%), transparent 60%),
      radial-gradient(900px 500px at 0% 100%, color-mix(in oklab, var(--bg) 92%, white 8%), transparent 60%),
      var(--bg);
  }
  html[data-theme="dark"] body {
    background:
      radial-gradient(900px 600px at 85% -10%, #2a3a52 0%, transparent 55%),
      radial-gradient(800px 600px at 15% 105%, #15243a 0%, transparent 55%),
      radial-gradient(700px 500px at 50% 50%, #14202f 0%, transparent 60%),
      linear-gradient(160deg, #0c1420 0%, #0a1019 100%);
  }

  .app { display: flex; min-height: 100vh; gap: 24px; padding: 20px; }

  /* Sidebar */
  .sidebar {
    width: 250px; flex: none;
    background: var(--sidebar);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-radius: 30px;
    padding: 24px 18px;
    display: flex; flex-direction: column; gap: 18px;
    box-shadow: var(--shadow);
    align-self: flex-start;
    position: sticky; top: 20px;
    max-height: calc(100vh - 40px);
  }
  html[data-theme="dark"] .sidebar {
    backdrop-filter: blur(20px) saturate(140%);
    -webkit-backdrop-filter: blur(20px) saturate(140%);
    background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.015));
    border-right: 1px solid rgba(255,255,255,0.06);
  }
  .logo-row { display: flex; align-items: center; gap: 10px; padding: 0 6px 16px; }
  .logo {
    width: 72px; height: 72px; border-radius: 50%;
    background: var(--logo-bg);
    display: grid; place-items: center;
    color: var(--logo-fg);
    font-weight: 700; font-size: 22px; letter-spacing: .5px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.15), 0 6px 18px rgba(0,0,0,.25);
    position: relative;
    text-decoration: none;
  }
  html[data-theme="dark"] .logo {
    width: 36px; height: 36px; font-size: 0;
    background: transparent; box-shadow: none;
  }
  html[data-theme="dark"] .logo::before {
    content: ""; position: absolute; inset: 0;
    border-radius: 50%;
    background:
      radial-gradient(circle at 50% 50%, transparent 35%, #fff 36%, #fff 41%, transparent 42%),
      radial-gradient(circle at 50% 50%, #fff 18%, transparent 19%);
  }
  html[data-theme="dark"] .logo-text { display: inline-block; }
  html[data-theme="light"] .logo-text { display: none; }
  .logo-text { color: var(--text); font-weight: 700; font-size: 22px; }

  .nav { display: flex; flex-direction: column; gap: 8px; flex: 1; overflow-y: auto; }
  .nav::-webkit-scrollbar { width: 6px; }
  .nav::-webkit-scrollbar-thumb { background: rgba(0,0,0,.08); border-radius: 4px; }
  .nav a {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 18px; border-radius: 16px;
    color: #222; text-decoration: none;
    font-size: 14.5px; font-weight: 500;
  }
  .nav a:hover { background: #f3f3f3; color: var(--text); }
  .nav a.active {
    background: linear-gradient(135deg,#0f3d2e,#062114);
    color: #fff;
    box-shadow: 0 10px 20px rgba(0,0,0,0.12);
  }
  .nav a.active svg { color: #fff; }
  .nav a.active .badge { color: #fff; opacity: .85; }
  .nav .badge { margin-left: auto; color: var(--red); font-weight: 700; font-size: 14px; }
  .nav svg { color: var(--text-2); width: 18px; height: 18px; flex: none; }
  .user-card {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 14px;
    background: rgba(255,255,255,0.6); border: 0;
    border-radius: 20px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.05);
  }
  html[data-theme="dark"] .user-card {
    backdrop-filter: blur(14px) saturate(140%);
    background: rgba(255,255,255,0.04);
    border-color: rgba(255,255,255,0.08);
  }
  .avatar {
    width: 46px; height: 46px; border-radius: 50%;
    background: linear-gradient(135deg,#7a7a7a,#3a3a3a);
    background-size: cover; background-position: center; flex: none;
    position: relative;
  }
  .user-card .name { font-size: 15px; font-weight: 600; color: var(--text); line-height: 1.15; }
  .user-card .role { font-size: 12px; color: var(--text-3); }
  .user-card .chev { margin-left: auto; color: var(--text-3); }

  /* Main */
  .main { flex: 1; display: flex; flex-direction: column; gap: 20px; min-width: 0; min-height: 0; height: calc(100vh - 40px); }

  .topbar { display: flex; align-items: center; gap: 16px; }
  .search {
    flex: 1; max-width: 520px;
    display: flex; align-items: center; gap: 10px;
    background: var(--search); border: 0;
    height: 58px; border-radius: 20px; padding: 0 22px;
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.03);
  }
  html[data-theme="dark"] .search,
  html[data-theme="dark"] .icon-btn,
  html[data-theme="dark"] .user-trigger,
  html[data-theme="dark"] .btn-primary,
  html[data-theme="dark"] .select,
  html[data-theme="dark"] .obra-panel,
  html[data-theme="dark"] .feed-panel,
  html[data-theme="dark"] .info-panel,
  html[data-theme="dark"] .composer,
  html[data-theme="dark"] .theme-switch {
    backdrop-filter: blur(14px) saturate(140%);
    -webkit-backdrop-filter: blur(14px) saturate(140%);
    background: rgba(255,255,255,0.04);
    border-color: rgba(255,255,255,0.08);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
  }
  .search input { flex: 1; background: transparent; border: 0; outline: 0; color: var(--text); font: 500 14.5px var(--font); }
  .search input::placeholder { color: var(--text-3); }
  .kbd {
    font-size: 12.5px; color: var(--text-3); display: inline-flex; gap: 4px;
    padding: 4px 8px; border-radius: 6px;
    background: color-mix(in oklab, var(--search) 70%, var(--bg));
    border: 1px solid var(--border);
  }
  .top-actions { margin-left: auto; display: flex; align-items: center; gap: 18px; }
  .btn-primary {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--novo-bg); color: var(--novo-fg);
    border: 0;
    height: 52px; padding: 0 28px; border-radius: 50px;
    font: 600 14px var(--font); cursor: pointer;
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    transition: opacity .18s ease, transform .18s ease, box-shadow .18s ease;
  }
  .btn-primary svg {
    width: 18px;
    height: 18px;
    flex: none;
  }
  .btn-primary:not(:disabled):hover {
    transform: translateY(-1px);
    box-shadow: 0 14px 30px rgba(0,0,0,0.18);
  }
  .btn-primary:disabled,
  .btn-primary.is-read {
    opacity: .55;
    cursor: default;
    transform: none;
    box-shadow: 0 8px 18px rgba(0,0,0,0.08);
  }
  .icon-btn {
    width: 48px; height: 48px; border-radius: 50%;
    background: rgba(255,255,255,0.7); border: 0;
    display: grid; place-items: center; position: relative; cursor: pointer; color: var(--text);
  }
  .icon-btn .dot {
    position: absolute; top: -2px; right: -2px;
    background: var(--red); color: #fff;
    min-width: 18px; height: 18px; border-radius: 9px;
    font-size: 11px; font-weight: 700;
    display: grid; place-items: center; padding: 0 4px;
    border: 2px solid var(--bg);
  }
  html[data-theme="dark"] .icon-btn .dot { border-color: #0b121c; }
  .user-trigger {
    display: flex; align-items: center; gap: 6px;
    background: transparent; border: 0;
    height: 48px; padding: 0; cursor: pointer;
  }
  .user-trigger .avatar { width: 48px; height: 48px; }

  /* Grid */
  .center { flex: 1; min-height: 0; display: grid; grid-template-columns: 320px 1fr 320px; gap: 18px; }

  /* Obra list */
  .obra-panel {
    background: rgba(255,255,255,0.55); border: 0;
    border-radius: 28px; padding: 20px;
    display: flex; flex-direction: column; gap: 12px;
    min-height: 0;
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.7), 0 10px 30px rgba(0,0,0,0.04);
  }
  .obra-panel h2 { margin: 0; font-size: 18px; font-weight: 800; color: var(--text); letter-spacing: -.2px; }
  .obra-top { display: flex; align-items: center; gap: 10px; }
  .obra-top .count {
    background: var(--green); color: #fff;
    font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 999px;
  }
  .obra-top .add {
    margin-left: auto; width: 32px; height: 32px; border-radius: 50%;
    background: var(--card-2); border: 1px solid var(--border-soft);
    display: grid; place-items: center; cursor: pointer; color: var(--text);
  }
  .obra-search {
    display: flex; align-items: center; gap: 8px;
    background: var(--card-2); border: 1px solid var(--border-soft);
    border-radius: 14px; padding: 8px 12px; color: var(--text-3);
  }
  .obra-search input { flex: 1; border: 0; background: transparent; outline: 0; color: var(--text); font: 500 13px var(--font); }
  .obra-filters { display: flex; gap: 6px; flex-wrap: wrap; }
  .obra-filters button {
    border: 1px solid var(--border-soft); background: transparent;
    color: var(--text-2); font: 600 12px var(--font);
    padding: 6px 11px; border-radius: 999px; cursor: pointer;
  }
  .obra-filters button.active { background: var(--green); color: #fff; border-color: transparent; }
  .obra-list { flex: 1; overflow: auto; display: flex; flex-direction: column; gap: 4px; margin: 0 -8px; padding: 0 8px; }
  .obra-list::-webkit-scrollbar { width: 8px; }
  .obra-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .obra {
    display: grid; grid-template-columns: 48px 1fr auto; gap: 10px;
    padding: 10px; border-radius: 14px; cursor: pointer; align-items: center;
  }
  .obra:hover { background: var(--card-2); }
  .obra.active { background: var(--card-2); }
  html[data-theme="dark"] .obra.active { background: rgba(255,255,255,0.07); }
  .obra .thumb {
    width: 48px; height: 48px; border-radius: 12px;
    background-size: cover; background-position: center;
    position: relative; overflow: hidden;
    border: 1px solid var(--border-soft);
  }
  .obra .thumb .swatch {
    position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
  }
  .obra .name-row { display: flex; align-items: center; gap: 6px; }
  .obra .name { font-size: 14px; font-weight: 700; color: var(--text); line-height: 1.1; }
  .obra .preview { font-size: 12.5px; color: var(--text-3); margin-top: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .obra .right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
  .obra .time { font-size: 11.5px; color: var(--text-3); }
  .obra .unread {
    min-width: 20px; height: 20px; border-radius: 10px; padding: 0 6px;
    background: var(--red); color: #fff;
    font: 700 11px var(--font);
    display: grid; place-items: center;
  }
  .obra .live {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 10px; font-weight: 700; color: #16a34a; text-transform: uppercase; letter-spacing: .5px;
  }
  html[data-theme="dark"] .obra .live { color: #34d399; }
  .obra .live::before {
    content:""; width: 6px; height: 6px; border-radius: 50%; background: #22c55e;
    box-shadow: 0 0 0 0 rgba(34,197,94,.7); animation: pulseDot 1.6s ease-out infinite;
  }
  @keyframes pulseDot { 0% { box-shadow: 0 0 0 0 rgba(34,197,94,.5); } 70% { box-shadow: 0 0 0 8px rgba(34,197,94,0); } }

  .section-title {
    font-size: 11px; font-weight: 700; color: var(--text-3);
    text-transform: uppercase; letter-spacing: .6px;
    padding: 10px 10px 4px;
  }

  /* Feed panel */
  .feed-panel {
    background: rgba(255,255,255,0.55); border: 0;
    border-radius: 28px; display: flex; flex-direction: column;
    min-height: 0; overflow: hidden;
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.7), 0 10px 30px rgba(0,0,0,0.04);
  }
  .feed-head {
    display: flex; align-items: center; gap: 14px;
    padding: 16px 20px; border-bottom: 1px solid var(--border-soft);
  }
  .feed-head .thumb {
    width: 52px; height: 52px; border-radius: 14px;
    background-size: cover; background-position: center;
    position: relative; border: 1px solid var(--border-soft);
  }
  .feed-head .title { font-size: 18px; font-weight: 800; color: var(--text); line-height: 1.1; letter-spacing: -.2px; }
  .feed-head .meta { font-size: 12.5px; color: var(--text-3); margin-top: 4px; display: flex; align-items: center; gap: 8px; }
  .feed-head .meta .pip { width: 7px; height: 7px; border-radius: 2px; }
  .feed-head .right { margin-left: auto; display: flex; gap: 8px; align-items: center; }
  .feed-head .iconbtn {
    width: 38px; height: 38px; border-radius: 50%;
    background: var(--card-2); border: 1px solid var(--border-soft);
    display: grid; place-items: center; cursor: pointer; color: var(--text);
  }
  .feed-head .followbtn {
    background: var(--green); color: #fff;
    border: 0; border-radius: 999px; padding: 8px 14px;
    font: 700 12px var(--font); cursor: pointer;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .feed-head .followbtn.unfollow {
    background: var(--card-2); color: var(--text); border: 1px solid var(--border-soft);
  }

  .feed-filters {
    display: flex; gap: 6px; padding: 12px 20px;
    border-bottom: 1px solid var(--border-soft);
    overflow-x: auto;
  }
  .feed-filters button {
    flex: none; border: 1px solid var(--border-soft); background: transparent;
    color: var(--text-2); font: 600 12.5px var(--font);
    padding: 7px 14px; border-radius: 999px; cursor: pointer;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .feed-filters button.active { background: var(--green); color: #fff; border-color: transparent; }
  .feed-filters button .count {
    font-size: 10.5px; padding: 1px 6px; border-radius: 999px;
    background: var(--card-2); color: var(--text-2);
  }
  .feed-filters button.active .count { background: rgba(255,255,255,.18); color: #fff; }

  .feed-body {
    flex: 1; overflow: auto; padding: 18px 22px;
    display: flex; flex-direction: column; gap: 0;
  }
  .feed-body::-webkit-scrollbar { width: 8px; }
  .feed-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .day-sep {
    display: flex; align-items: center; gap: 10px; margin: 10px 0 6px;
    color: var(--text-3); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px;
  }
  .day-sep .line { flex: 1; height: 1px; background: var(--border); }

  /* Timeline events */
  .ev {
    position: relative; padding: 14px 0 14px 44px;
    border-bottom: 1px solid var(--border-soft);
  }
  .ev:last-child { border-bottom: 0; }
  .ev::before {
    content: ""; position: absolute; left: 17px; top: 22px; bottom: -14px;
    width: 2px; background: var(--border);
  }
  .ev:last-child::before { display: none; }
  .ev .dot {
    position: absolute; left: 4px; top: 14px;
    width: 30px; height: 30px; border-radius: 10px;
    display: grid; place-items: center;
    background: var(--card-2); border: 1px solid var(--border-soft);
    color: var(--text);
  }
  .ev .head {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    font-size: 13.5px; color: var(--text-2);
  }
  .ev .head .who { font-weight: 700; color: var(--text); }
  .ev .head .time { margin-left: auto; font-size: 11.5px; color: var(--text-3); }
  .ev .head .tag {
    font: 700 10px var(--font); padding: 2px 7px; border-radius: 999px;
    background: var(--card-2); color: var(--text-2); letter-spacing: .4px; text-transform: uppercase;
  }
  .ev .head .tag.t-progress  { background: rgba(34,197,94,.18); color: #15803d; }
  .ev .head .tag.t-photo     { background: rgba(168,85,247,.18); color: #7e22ce; }
  .ev .head .tag.t-file      { background: rgba(59,130,246,.18); color: #1d4ed8; }
  .ev .head .tag.t-inspection{ background: rgba(20,184,166,.18); color: #0f766e; }
  .ev .head .tag.t-comment   { background: rgba(100,116,139,.22); color: #475569; }
  .ev .head .tag.t-approval  { background: rgba(234,179,8,.22); color: #a16207; }
  .ev .head .tag.t-alert     { background: rgba(239,68,68,.18); color: #b91c1c; }
  .ev .head .tag.t-milestone { background: rgba(20,83,45,.22); color: #14532d; }
  html[data-theme="dark"] .ev .head .tag.t-progress   { color: #86efac; }
  html[data-theme="dark"] .ev .head .tag.t-photo      { color: #d8b4fe; }
  html[data-theme="dark"] .ev .head .tag.t-file       { color: #93c5fd; }
  html[data-theme="dark"] .ev .head .tag.t-inspection { color: #5eead4; }
  html[data-theme="dark"] .ev .head .tag.t-comment    { color: #cbd5e1; }
  html[data-theme="dark"] .ev .head .tag.t-approval   { color: #fde68a; }
  html[data-theme="dark"] .ev .head .tag.t-alert      { color: #fca5a5; }
  html[data-theme="dark"] .ev .head .tag.t-milestone  { color: #86efac; }

  .ev .body {
    margin-top: 8px; padding: 12px 14px;
    background: var(--card-2); border: 1px solid var(--border-soft);
    border-radius: 14px;
  }
  .ev .body.plain { background: transparent; border: 0; padding: 0; }
  .ev .body .title { font-size: 14.5px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
  .ev .body .text  { font-size: 13.5px; color: var(--text-2); line-height: 1.5; }
  .ev .photo {
    margin-top: 10px; border-radius: 12px; overflow: hidden;
    border: 1px solid var(--border-soft);
  }
  .ev .photo img { display: block; width: 100%; max-height: 280px; object-fit: cover; }
  .ev .progress-card {
    margin-top: 10px; display: flex; align-items: center; gap: 12px;
    padding: 12px; background: var(--card-2); border: 1px solid var(--border-soft);
    border-radius: 14px;
  }
  .ev .progress-card .pct { font: 800 22px var(--font); color: #15803d; min-width: 56px; }
  html[data-theme="dark"] .ev .progress-card .pct { color: #34d399; }
  .ev .progress-card .stage { font-size: 13px; font-weight: 700; color: var(--text); }
  .ev .progress-card .delta { font-size: 11.5px; color: var(--text-3); }
  .ev .progress-card .bar { flex: 1; height: 6px; background: color-mix(in oklab, var(--card-2) 30%, var(--border)); border-radius: 6px; overflow: hidden; }
  .ev .progress-card .bar > i { display: block; height: 100%; background: linear-gradient(90deg,#22c55e,#16a34a); border-radius: 6px; }

  .ev .file-row {
    margin-top: 10px;
    display: flex; align-items: center; gap: 12px;
    padding: 12px; border-radius: 12px; background: var(--card-2);
    border: 1px solid var(--border-soft);
  }
  .ev .file-row .ic {
    width: 40px; height: 40px; border-radius: 10px;
    background: var(--card); display: grid; place-items: center;
  }
  .ev .file-row .fname { font-size: 13.5px; font-weight: 700; color: var(--text); }
  .ev .file-row .fmeta { font-size: 11.5px; color: var(--text-3); margin-top: 2px; }
  .ev .file-row .download { color: var(--text-3); cursor: pointer; }

  .ev .actions {
    display: flex; align-items: center; gap: 18px; margin-top: 10px;
    padding-top: 4px;
  }
  .ev .actions span {
    display: inline-flex; align-items: center; gap: 6px;
    color: var(--text-3); font: 600 12px var(--font); cursor: pointer;
  }
  .ev .actions span:hover { color: var(--text-2); }
  .ev .actions .heart { color: var(--red); }

  /* Composer */
  .composer {
    border-top: 1px solid var(--border-soft);
    padding: 12px 14px;
    background: var(--card);
    display: flex; align-items: center; gap: 8px;
  }
  .composer .iconbtn {
    width: 36px; height: 36px; border-radius: 50%;
    display: grid; place-items: center; cursor: pointer;
    background: transparent; border: 0; color: var(--text-2);
  }
  .composer .iconbtn:hover { background: var(--card-2); color: var(--text); }
  .composer .input-wrap {
    flex: 1; display: flex; align-items: center; gap: 6px;
    background: var(--card-2); border: 1px solid var(--border-soft);
    border-radius: 20px; padding: 8px 12px;
  }
  .composer input {
    flex: 1; background: transparent; border: 0; outline: 0;
    color: var(--text); font: 500 13.5px var(--font);
  }
  .composer .send {
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--green); color: #fff; border: 0; cursor: pointer;
    display: grid; place-items: center;
  }
  html[data-theme="dark"] .composer .send { background: #16a34a; }

  /* Info panel */
  .info-panel {
    background: rgba(255,255,255,0.55); border: 0;
    border-radius: 28px; padding: 22px;
    display: flex; flex-direction: column; gap: 16px;
    overflow: auto; min-height: 0;
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.7), 0 10px 30px rgba(0,0,0,0.04);
  }
  .info-panel::-webkit-scrollbar { width: 8px; }
  .info-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .info-cover {
    height: 110px; border-radius: 14px; overflow: hidden;
    background-size: cover; background-position: center;
    position: relative;
  }
  .info-cover::after {
    content:""; position: absolute; inset: 0;
    background: linear-gradient(180deg, transparent 40%, rgba(0,0,0,.55));
  }
  .info-cover .badge {
    position: absolute; left: 10px; top: 10px;
    background: rgba(0,0,0,.55); color: #fff;
    border-radius: 999px; padding: 4px 10px;
    font: 700 11px var(--font); display: inline-flex; align-items: center; gap: 6px; z-index: 1;
  }
  .info-name { font-size: 17px; font-weight: 800; color: var(--text); margin-top: -8px; }
  .info-loc  { font-size: 12.5px; color: var(--text-3); display: inline-flex; align-items: center; gap: 6px; }
  .quick-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
  .quick-row button {
    border: 1px solid var(--border-soft); background: var(--card-2);
    color: var(--text); border-radius: 12px; padding: 10px 4px;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    font: 600 10.5px var(--font); cursor: pointer;
  }
  .quick-row button:hover { background: var(--card); }
  .info-section h4 {
    margin: 0 0 8px; font-size: 11px; color: var(--text-3);
    text-transform: uppercase; letter-spacing: .6px;
  }
  .info-section .row {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 0; font-size: 13px; color: var(--text);
    border-bottom: 1px solid var(--border-soft);
  }
  .info-section .row:last-child { border-bottom: 0; }
  .info-section .row .key { color: var(--text-3); }
  .info-section .row .val { margin-left: auto; font-weight: 600; }
  .stage-bar { height: 6px; border-radius: 6px; background: color-mix(in oklab, var(--card-2) 30%, var(--border)); overflow: hidden; margin-top: 6px; }
  .stage-bar > i { display: block; height: 100%; background: linear-gradient(90deg,#22c55e,#16a34a); }
  .team-row { display: flex; align-items: center; gap: 8px; padding: 6px 0; }
  .team-row .av { width: 30px; height: 30px; border-radius: 50%; background-size: cover; background-position: center; }
  .team-row .who { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.1; }
  .team-row .role { font-size: 11.5px; color: var(--text-3); }

  /* Theme switch */
  .theme-switch {
    position: fixed; right: 22px; bottom: 22px; z-index: 50;
    background: rgba(255,255,255,0.7); border: 0;
    border-radius: 24px; padding: 6px;
    display: inline-flex; gap: 4px;
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  }
  .theme-switch button {
    border: 0; background: transparent; cursor: pointer;
    width: 38px; height: 38px; border-radius: 50%;
    display: grid; place-items: center; color: var(--text-2);
  }
  .theme-switch button.active {
    background: linear-gradient(135deg,#113a2b,#062114);
    color: #fff;
  }

  @media (max-width: 1200px) {
    .app { flex-direction: column; }
    .sidebar { width: 100%; position: static; max-height: none; }
    .search { max-width: 100%; }
    .topbar { flex-direction: column; gap: 16px; align-items: stretch; }
    .main { height: auto; }
    .center { grid-template-columns: 300px 1fr; }
    .info-panel { display: none; }
  }
  @media (max-width: 900px) {
    .center { grid-template-columns: 1fr; }
  }

    if (filter === "live") l = l.filter((o) => o.live);

  }, [obras, filter]);

  const total = obras.reduce((s, o) => s + o.unread, 0);

  return (

const FILTERS = [
{ key: "todas", label: "Tudo", types: null },
{ key: "progress", label: "Avanço", types: ["progress", "milestone"] },
{ key: "photo", label: "Fotos", types: ["photo"] },
{ key: "file", label: "Arquivos", types: ["file"] },
{ key: "inspection", label: "Vistorias", types: ["inspection"] },
{ key: "comment", label: "Comentários", types: ["comment"] },
{ key: "approval", label: "Aprovações", types: ["approval"] },
{ key: "alert", label: "Alertas", types: ["alert"] }];


function FeedPanel({ obra, events, filter, setFilter, onSend }) {
  const [draft, setDraft] = useState("");
  const ref = useRef(null);

  const counts = useMemo(() => {
    const c = {};
    events.forEach((e) => {if (e.type) c[e.type] = (c[e.type] || 0) + 1;});
    return c;
  }, [events]);

  const filtered = useMemo(() => {
    if (filter === "todas") return events;
    const types = FILTERS.find((f) => f.key === filter)?.types || [];
    const out = [];
    let lastDay = null;
    for (const e of events) {
      if (e.day) {lastDay = e;continue;}
      if (types.includes(e.type)) {
        if (lastDay) {out.push(lastDay);lastDay = null;}
        out.push(e);
      }
    }
    return out;
  }, [events, filter]);

  useEffect(() => {if (ref.current) ref.current.scrollTop = 0;}, [obra.id]);

  const submit = (e) => {
    e.preventDefault();
    if (!draft.trim()) return;
    onSend(draft.trim());
    setDraft("");
  };

  return (
    <section className="feed-panel">
      <div className="feed-head">
        <div className="thumb" style={{ backgroundImage: `url(${obra.thumb})` }}></div>
        <div style={{ minWidth: 0 }}>
          <div className="title">{obra.name}</div>
          <div className="meta">
            <span className="pip" style={{ background: obra.color }}></span>
            {obra.stage} · {obra.progress}%· {obra.loc}
          </div>
        </div>
        <div className="right">
          <button className={"followbtn" + (obra.following ? " unfollow" : "")} style={{ width: "120px" }}>
            {obra.following ? "Acompanhando" : "Acompanhar"}
          </button>
          <button className="iconbtn" title="Notificações">{I.bell}</button>
          <button className="iconbtn" title="Mais">{I.more}</button>
        </div>
      </div>
      <div className="feed-filters">
        {FILTERS.map((f) =>
        <button key={f.key} className={filter === f.key ? "active" : ""} onClick={() => setFilter(f.key)}>
            <span>{f.label}</span>
            {f.key !== "todas" && counts[f.types[0]] &&
          <span className="count">{f.types.reduce((s, t) => s + (counts[t] || 0), 0)}</span>
          }
          </button>
        )}
      </div>
      <div className="feed-body" ref={ref}>
        {filtered.length === 0 &&
        <div style={{ padding: 30, textAlign: "center", color: "var(--text-3)" }}>Nenhuma atualização neste filtro.</div>
        }
        {filtered.map((e, i) => {
          if (e.day) return (
            <div key={"d" + i} className="day-sep">
              <span>{e.day}</span>
              <span className="line"></span>
            </div>);

          const t = TYPE[e.type];
          return (
            <article key={e.id} className="ev">
              <div className="dot">{t.ic}</div>
              <div className="head">
                <span className="who">{e.who}</span>
                {e.type === "progress" && <span>atualizou <b>{e.stage}</b></span>}
                {e.type === "photo" && <span>compartilhou uma foto</span>}
                {e.type === "file" && <span>anexou um arquivo</span>}
                {e.type === "inspection" && <span>registrou vistoria</span>}
                {e.type === "comment" && <span>comentou</span>}
                {e.type === "approval" && <span>{e.title || "solicitou aprovação"}</span>}
                {e.type === "alert" && <span>{e.title || "publicou alerta"}</span>}
                {e.type === "milestone" && <span>{e.title || "atingiu um marco"}</span>}
                <span className={"tag " + t.cls}>{t.label}</span>
                <span className="time">{e.time}</span>
              </div>
              {e.type === "progress" &&
              <div className="progress-card">
                  <div className="pct">{e.to}%</div>
                  <div style={{ flex: 1 }}>
                    <div className="stage">{e.stage}</div>
                    <div className="delta">+{e.to - e.from} pontos · cronograma adiantado</div>
                    <div className="bar"><i style={{ width: e.to + "%" }}></i></div>
                  </div>
                </div>
              }
              {(e.type === "comment" || e.type === "photo") && e.text &&
              <div className="body"><div className="text">{e.text}</div></div>
              }
              {(e.type === "approval" || e.type === "alert" || e.type === "milestone" || e.type === "inspection") && e.text &&
              <div className="body">
                  {e.title && <div className="title">{e.title}</div>}
                  <div className="text">{e.text}</div>
                </div>
              }
              {e.photo &&
              <div className="photo"><img src={e.photo} alt="" /></div>
              }
              {e.file &&
              <div className="file-row">
                  <div className="ic">{I.pdf}</div>
                  <div style={{ flex: 1 }}>
                    <div className="fname">{e.file.name}</div>
                    <div className="fmeta">{e.file.size} · {e.file.type}</div>
                  </div>
                  <span className="download">{I.download}</span>
                </div>
              }
              {e.checklist &&
              <div className="body" style={{ display: "flex", gap: 14, alignItems: "center" }}>
                  <div style={{ display: "flex", gap: 14 }}>
                    <span style={{ color: "#15803d", fontWeight: 700 }}>✓ {e.checklist.ok} ok</span>
                    {e.checklist.pending > 0 && <span style={{ color: "#b45309", fontWeight: 700 }}>● {e.checklist.pending} pendente</span>}
                  </div>
                </div>
              }
              {(e.likes !== undefined || e.comments !== undefined) &&
              <div className="actions">
                  <span className="heart">{I.heart}<span>{e.likes ?? 0}</span></span>
                  <span>{I.comment}<span>{e.comments ?? 0}</span></span>
                  <span>{I.send}</span>
                </div>
              }
            </article>);

        })}
      </div>
      <form className="composer" onSubmit={submit}>
        <button type="button" className="iconbtn" title="Anexo">{I.clip}</button>
        <button type="button" className="iconbtn" title="Foto">{I.camera}</button>
        <div className="input-wrap">
          <input
            value={draft}
            onChange={(e) => setDraft(e.target.value)}
            placeholder={"Comentar em " + obra.name + "..."} />
          
          <button type="button" className="iconbtn" style={{ width: 28, height: 28 }}>{I.smile}</button>
        </div>
        <button type="submit" className="send" title="Publicar">{I.send}</button>
      </form>
    </section>);

}

function App() {
  const [theme, setTheme] = useState(() => localStorage.getItem("mis-theme") || "light");
  const [activeId, setActiveId] = useState("villa");
  const [filter, setFilter] = useState("todas");
  const [feedFilter, setFeedFilter] = useState("todas");
  const [feeds, setFeeds] = useState(FEEDS);
  const [obras, setObras] = useState(OBRAS);

  useEffect(() => {
    document.documentElement.setAttribute("data-theme", theme);
    localStorage.setItem("mis-theme", theme);
  }, [theme]);

  useEffect(() => {setFeedFilter("todas");}, [activeId]);

  const totalUnread = useMemo(() => obras.reduce((sum, o) => sum + (o.unread || 0), 0), [obras]);
  const obra = obras.find((o) => o.id === activeId) || obras[0];
  const events = feeds[activeId] || [];

  const markAllAsRead = () => {
    setObras((prev) => prev.map((o) => ({ ...o, unread: 0 })));
  };

  const post = (text) => {
    const t = new Date();
    const time = t.getHours().toString().padStart(2, "0") + ":" + t.getMinutes().toString().padStart(2, "0");
    setFeeds((prev) => {
      const list = prev[activeId] || [];
      // insert at top, after the first day separator (or as new day)
      const newEv = { id: Date.now(), type: "comment", who: "Carlos Mendes", whoImg: PHOTOS.carlos, time, text, likes: 0, comments: 0 };
      const out = [...list];
      // find first day sep
      const i = out.findIndex((x) => x.day);
      if (i === 0) out.splice(1, 0, newEv);else
      out.unshift({ day: "Hoje" }, newEv);
      return { ...prev, [activeId]: out };
    });
  };

  return (
    <div className="app">
      <Sidebar totalUnread={totalUnread} />
      <main className="main">
        <Topbar totalUnread={totalUnread} onMarkAllRead={markAllAsRead} theme={theme} setTheme={setTheme} />
        <div className="center">
          <ObraList obras={obras} activeId={activeId} setActiveId={setActiveId} filter={filter} setFilter={setFilter} />
          <FeedPanel obra={obra} events={events} filter={feedFilter} setFilter={setFeedFilter} onSend={post} />
          <InfoPanel obra={obra} />
        </div>
      </main>
    </div>);

}
